<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceMail AI - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glow-purple { position: absolute; top: -10%; left: -10%; width: 40vw; height: 40vw; background: rgba(147, 51, 234, 0.15); filter: blur(120px); border-radius: 50%; z-index: -1; pointer-events: none;}
        .glow-blue { position: absolute; bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: rgba(59, 130, 246, 0.15); filter: blur(120px); border-radius: 50%; z-index: -1; pointer-events: none;}
    </style>
</head>
<body class="relative flex flex-col p-8 items-center">
    <div class="glow-purple"></div>
    <div class="glow-blue"></div>

    <div class="w-full max-w-4xl z-10">
        <div class="flex justify-between items-center mb-8">
            <a href="/dashboard" class="inline-flex items-center text-white/50 hover:text-white transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Dashboard
            </a>
            <a href="/logout" class="text-white/40 hover:text-white text-sm transition-colors">Log out</a>
        </div>
        
        <h2 class="text-3xl font-light mb-8">Profile Details</h2>

        <div id="loading" class="animate-pulse space-y-4">
            <div class="h-24 bg-white/5 rounded-xl"></div>
            <div class="h-48 bg-white/5 rounded-xl"></div>
        </div>

        <div id="error" class="hidden glass-panel p-6 border-red-500/30 bg-red-500/10 text-red-200 rounded-xl mb-4"></div>

        <div id="content" class="space-y-6 hidden">
            <div class="glass-panel p-8 rounded-2xl flex items-center gap-6">
                <div class="w-20 h-20 rounded-full bg-blue-500/20 flex items-center justify-center">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <div>
                    <p class="text-white/60 uppercase text-xs tracking-wider mb-1">Authenticated Account</p>
                    <h3 id="user-name" class="text-2xl font-medium">Loading...</h3>
                    <p id="user-email" class="text-white/80">...</p>
                </div>
                <div class="ml-auto p-4 bg-purple-500/10 border border-purple-500/20 rounded-xl text-center flex flex-col items-center">
                    <p class="text-purple-300 text-xs uppercase tracking-widest mb-2">Voice PIN</p>
                    <div class="flex items-center gap-2">
                        <input type="text" id="user-pin-input" maxlength="4" class="w-20 bg-black/30 text-white text-2xl font-mono text-center border border-purple-500/30 rounded-lg outline-none focus:border-purple-400 py-1" value="----">
                        <button onclick="updatePin()" id="pin-btn" class="bg-purple-600 hover:bg-purple-500 text-white text-xs px-3 py-2 rounded-lg transition-colors font-medium">Save</button>
                    </div>
                    <p id="pin-msg" class="text-xs text-green-400 mt-2 hidden">PIN Updated!</p>
                </div>
            </div>

            <div class="glass-panel p-8 rounded-2xl">
                <h4 class="text-xl font-light mb-6 border-b border-white/10 pb-4">Saved Contact Directory</h4>
                <div id="contacts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Javascript populates this -->
                </div>
                <p id="contacts-empty" class="hidden text-white/50 italic">No contacts synced to your database yet.</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchProfile() {
            try {
                const res = await fetch('/api/profile');
                if(!res.ok) throw new Error('Failed to load profile');
                const data = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                
                document.getElementById('user-name').innerText = data.name || "User";
                document.getElementById('user-email').innerText = data.email || "Manual Active Session";
                
                if (data.pin) {
                    document.getElementById('user-pin-input').value = data.pin;
                }

                const container = document.getElementById('contacts-container');
                if(Object.keys(data.contacts || {}).length > 0) {
                    let html = '';
                    for (const [name, details] of Object.entries(data.contacts)) {
                        html += `
                        <div class="p-4 bg-white/5 rounded-xl border border-white/10">
                            <p class="font-medium capitalize text-lg text-fuchsia-400 mb-1">${name}</p>
                            <p class="text-sm text-white/70">Email: ${details.email}</p>
                            ${details.telegram ? `<p class="text-sm text-white/70">Telegram: ${details.telegram}</p>` : ''}
                        </div>`;
                    }
                    container.innerHTML = html;
                } else {
                    document.getElementById('contacts-empty').classList.remove('hidden');
                }
            } catch(e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('error').innerText = e.message;
            }
        }
        fetchProfile();

        async function updatePin() {
            const newPin = document.getElementById('user-pin-input').value;
            const btn = document.getElementById('pin-btn');
            const msg = document.getElementById('pin-msg');
            
            if (newPin.length !== 4 || isNaN(newPin)) {
                alert("PIN must be exactly 4 digits.");
                return;
            }
            
            btn.innerText = "Saving...";
            try {
                const res = await fetch('/api/profile/pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: newPin })
                });
                const data = await res.json();
                
                if (data.success) {
                    msg.classList.remove('hidden');
                    msg.innerText = "PIN Updated!";
                    msg.classList.remove('text-red-400');
                    msg.classList.add('text-green-400');
                    setTimeout(() => msg.classList.add('hidden'), 3000);
                } else {
                    throw new Error(data.error || "Failed to update PIN");
                }
            } catch(e) {
                msg.classList.remove('hidden');
                msg.innerText = e.message;
                msg.classList.remove('text-green-400');
                msg.classList.add('text-red-400');
            } finally {
                btn.innerText = "Save";
            }
        }
    </script>
</body>
</html>
